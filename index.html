<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>Status</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>Can Cai Play? </h1>
<h1>生死不明，那就是死了</h1>

<div id="status-light"></div>

<h2 id="status-text">Loading...</h2>

<p id="status-message"></p>

<p id="status-until"></p>

<p class="update">auto refresh: not working</p>

</div>

<script>

async function loadStatus() {

const res = await fetch("status.json?cache=" + Date.now());
const data = await res.json();

const light = document.getElementById("status-light");
const text = document.getElementById("status-text");

text.innerText = data.status.toUpperCase();
document.getElementById("status-message").innerText = data.message;
document.getElementById("status-until").innerText = "Until: " + data.until;

light.className = data.status;

}

loadStatus();

setInterval(loadStatus, 6000);

</script>

</body>

</html>
